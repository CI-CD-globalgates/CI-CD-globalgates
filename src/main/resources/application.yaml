server:
  port: 10000
  servlet:
    session:
      tracking-modes: cookie
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${EC2_HOST}:${PSQL_PORT}/${PSQL_DATABASE}?serverTimezone=Asia/Seoul
    username: ${PSQL_USERNAME}
    password: ${PSQL_PASSWORD}

  session:
    redis:
      repository-type: indexed
      flush-mode: immediate
  data:
    redis:
      host: ${EC2_HOST}
      port: ${REDIS_PORT}

  cache:
    type: redis

  profiles:
    active: local
    include: oauth

  servlet:
    multipart:
      enabled: true
      file-size-threshold: 10MB
      max-file-size: 5MB
      max-request-size: 15MB

  rabbitmq:
    host: ${EC2_HOST1}
    port: 5672
    username: guest
    password: guest

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: "${MAIL_PASSWORD}"
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.app.globalgates.domain; com.app.globalgates.dto;
  type-handlers-package: com.app.globalgates.mybatis.handler
  configuration:
    map-underscore-to-camel-case: true

# openssl rand -base64 32
jwt:
  secret: ${JWT_SECRET}

aws:
  access-key: ${AWS_ACCESS_KEY}
  secret-key: ${AWS_SECRET_KEY}
  s3:
    bucket-name: ${AWS_BUCKET_NAME}
  region: ${AWS_REGION}

google:
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY}

message:
  api-key: ${MESSAGE_API_KEY}
  api-secret-key: ${MESSAGE_API_SECRET}

bootpay:
  application-id: ${BOOTPAY_APPLICATION_ID}
  private-key: ${BOOTPAY_SECRET_KEY}
  api-base-url: https://api.bootpay.co.kr

ai:
  fastapi:
    base-url: ${FASTAPI_BASE_URL:}
    internal-token: ${INTERNAL_AI_TOKEN:}
  rag:
    storage-root-dir: ${user.dir}/storage/rag